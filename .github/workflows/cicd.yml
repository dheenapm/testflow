name: CI/CD (Release → QA → Prod)

on:
  push:
    branches:
      - release
      - main

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Build completed"

  deploy_qa:
    if: github.ref == 'refs/heads/release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: qa
    steps:
      - run: echo "Deploying to QA environment"

  qa_approval_gate:
    if: github.ref == 'refs/heads/release'
    needs: deploy_qa
    runs-on: ubuntu-latest
    environment:
      name: qa
    steps:
      - run: echo "QA approval required"

  deploy_prod:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - run: echo "Deploying to PROD"
