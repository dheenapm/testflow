name: CI/CD Pipeline

on:
  push:
    branches:
      - release

jobs:

  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build step
        run: echo "Building application..."

  deploy_qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: qa   # 👈 THIS triggers approval gate

    steps:
      - name: Deploy to QA
        run: echo "Deploying to QA environment..."

  # Optional future step (PROD)
  deploy_prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy_qa

    environment:
      name: prod

    steps:
      - name: Deploy to Production
        run: echo "Deploying to production..."
