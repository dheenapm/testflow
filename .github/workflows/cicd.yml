name: CI/CD Pipeline

on:
  push:
    branches:
      - release

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building..."

  deploy_qa:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: qa
    steps:
      - run: echo "Deploying to QA..."

  deploy_prod:
    runs-on: ubuntu-latest
    needs: deploy_qa
    environment:
      name: prod
    steps:
      - run: echo "Deploying to PROD..."
