name: CI/CD Pipeline

on:
  push:
    branches:
      - release
      - main

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Build OK"

  deploy_qa:
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/release'

    environment:
      name: qa

    steps:
      - run: echo "Deploying to QA"

  deploy_prod:
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/main'

    environment:
      name: prod

    steps:
      - run: echo "Deploying to PROD"
