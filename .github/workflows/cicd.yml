name: CI/CD Pipeline

on:
  push:
    branches:
      - release
      - main

  pull_request:
    branches:
      - release

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Build OK"

  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running PR validation tests"

  deploy_qa:
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: qa
    steps:
      - run: echo "Deploying to QA"

  deploy_prod:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: prod
    steps:
      - run: echo "Deploying to PROD"
