name: CI/CD Pipeline

on:
  push:
    branches: ["main", "feature", "release"]
  pull_request:
    branches: ["feature/*"]
  
jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building..."

  deploy_qa:
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: qa
    steps:
      - run: echo "Deploying to QA..."

  deploy_prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: prod
    steps:
      - run: echo "Deploying to PROD..."
